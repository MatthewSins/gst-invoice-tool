<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TaxPulse Pro — AI Invoice Scanner + GST Returns</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
<style>
:root { --ink: #0f172a; --card: #ffffff; --border: #e2e8f0; --accent: #2563eb; --surface: #f8fafc; --radius: 12px; --shadow: 0 4px 6px -1px rgba(0,0,0,0.1); --font: -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; }
body.dark { --ink: #f8fafc; --card: #1e293b; --border: #334155; --surface: #0f172a; }
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--font); background: var(--surface); color: var(--ink); }
nav { background: var(--card); padding: 16px 24px; display: flex; justify-content: space-between; align-items: center; box-shadow: var(--shadow); }
.nav-brand { font-size: 18px; font-weight: 800; color: var(--accent); }
.app { max-width: 1200px; margin: 0 auto; padding: 32px 20px; }
.tabs { display: flex; gap: 4px; margin-bottom: 32px; border-bottom: 1px solid var(--border); }
.tab-btn { background: none; border: none; padding: 12px 20px; cursor: pointer; font-weight: 600; color: #999; border-radius: 8px 8px 0 0; }
.tab-btn.active { color: var(--accent); background: var(--accent); background: rgba(37,99,235,0.1); }
.btn { padding: 10px 18px; border-radius: 8px; border: none; cursor: pointer; font-weight: 600; display: inline-flex; align-items: center; gap: 8px; }
.btn-primary { background: var(--accent); color: white; }
.btn-outline { background: var(--card); border: 1px solid var(--border); color: var(--ink); }
.btn:disabled { opacity: 0.6; cursor: not-allowed; }
.form-group { margin-bottom: 16px; }
.form-group label { display: block; font-size: 12px; font-weight: 700; margin-bottom: 8px; text-transform: uppercase; }
.form-group input, .form-group textarea { width: 100%; padding: 12px; border: 1px solid var(--border); border-radius: 8px; background: var(--surface); color: var(--ink); font-family: var(--font); }
.upload-zone { border: 2px dashed var(--border); border-radius: 12px; padding: 32px; text-align: center; cursor: pointer; }
.upload-zone:hover { border-color: var(--accent); background: rgba(37,99,235,0.05); }
.data-section { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; box-shadow: var(--shadow); margin-bottom: 32px; }
.data-header { padding: 16px 24px; border-bottom: 1px solid var(--border); font-weight: 700; }
.data-table { width: 100%; border-collapse: collapse; }
.data-table th { padding: 12px; text-align: left; background: var(--surface); font-weight: 700; font-size: 12px; text-transform: uppercase; border-bottom: 1px solid var(--border); }
.data-table td { padding: 12px; border-bottom: 1px solid var(--border); }
.modal { position: fixed; inset: 0; background: rgba(0,0,0,0.7); display: none; align-items: center; justify-content: center; z-index: 200; }
.modal.active { display: flex; }
.modal-content { background: var(--card); border-radius: 16px; padding: 32px; max-width: 700px; width: 90%; max-height: 90vh; overflow-y: auto; }
.toast { position: fixed; bottom: 24px; right: 24px; padding: 12px 18px; background: var(--ink); color: white; border-radius: 10px; opacity: 0; z-index: 300; }
.toast.show { opacity: 1; }
.auth-container { max-width: 420px; margin: 80px auto; padding: 40px; background: var(--card); border-radius: 16px; box-shadow: var(--shadow); }
.stat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 16px; margin-bottom: 32px; }
.stat-card { background: var(--card); border: 1px solid var(--border); padding: 20px; border-radius: var(--radius); }
.stat-value { font-size: 24px; font-weight: 800; margin-top: 8px; }
.chart-container { position: relative; height: 400px; margin-bottom: 32px; }
</style>
</head>
<body>

<nav>
  <div class="nav-brand">TaxPulse Pro</div>
  <div id="nav-user" style="display:none;">
    <button class="btn btn-primary" onclick="handleLogout()">Sign Out</button>
  </div>
</nav>

<div id="auth-view" class="auth-container">
  <h2 style="text-align:center; margin-bottom:24px;">TaxPulse Pro</h2>
  <div class="form-group">
    <label>Email</label>
    <input type="email" id="auth-email">
  </div>
  <div class="form-group">
    <label>Password</label>
    <input type="password" id="auth-password">
  </div>
  <button class="btn btn-primary" id="login-btn" style="width:100%; padding:14px;" onclick="handleLoginSubmit()">Login</button>
  <button class="btn btn-outline" id="signup-btn" style="width:100%; padding:14px; margin-top:12px;" onclick="handleSignupSubmit()">Sign Up</button>
</div>

<div class="app" id="app-view" style="display:none;">

  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('dashboard')">Dashboard</button>
    <button class="tab-btn" onclick="switchTab('scanner')">AI Scanner</button>
    <button class="tab-btn" onclick="switchTab('gstr')">GST Returns</button>
    <button class="tab-btn" onclick="switchTab('invoice')">Invoice Generator</button>
  </div>

  <div id="dashboard-view">
    <h2 style="margin-bottom:24px;">Dashboard</h2>
    <div class="stat-grid">
      <div class="stat-card">
        <div style="font-size:12px; color:#999; text-transform:uppercase;">Total Sales</div>
        <div class="stat-value" id="stat-sales">₹0</div>
      </div>
      <div class="stat-card">
        <div style="font-size:12px; color:#999; text-transform:uppercase;">GST Collected</div>
        <div class="stat-value" id="stat-gst">₹0</div>
      </div>
      <div class="stat-card">
        <div style="font-size:12px; color:#999; text-transform:uppercase;">Scanned</div>
        <div class="stat-value" id="stat-scanned">0</div>
      </div>
    </div>
    <div class="chart-container">
      <canvas id="salesChart"></canvas>
    </div>
  </div>

  <div id="scanner-view" style="display:none;">
    <h2 style="margin-bottom:24px;">AI Invoice Scanner</h2>
    <div class="data-section">
      <div class="data-header">Upload Invoices (Max 5)</div>
      <div style="padding:24px;">
        <div class="upload-zone" onclick="document.getElementById('file-input').click()">
          <div style="font-size:36px; margin-bottom:12px;">📸</div>
          <div style="font-weight:600;">Click or drag to upload</div>
          <div style="font-size:12px; color:#999;">Images and PDFs (max 5 files)</div>
          <input type="file" id="file-input" multiple accept="image/*,.pdf" style="display:none;" onchange="handleFileSelect(event)">
        </div>
        <div id="upload-progress" style="margin-top:20px; display:none;">
          <div id="progress-list"></div>
        </div>
      </div>
    </div>

    <div id="extraction-view" style="display:none;">
      <h3 style="margin:24px 0 16px;">Extracted Data - Review & Edit</h3>
      <div class="data-section">
        <div style="padding:24px;">
          <div id="extraction-form"></div>
          <div style="display:flex; gap:12px; margin-top:24px;">
            <button class="btn btn-outline" onclick="resetScanner()">Clear</button>
            <button class="btn btn-primary" onclick="saveExtractedInvoices()">Save to Invoices</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div id="gstr-view" style="display:none;">
    <h2 style="margin-bottom:24px;">GST Returns</h2>
    <div style="display:grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap:12px; margin-bottom:32px;">
      <button class="btn btn-primary" onclick="generateGSTR('1')" style="padding:16px;">GSTR-1</button>
      <button class="btn btn-primary" onclick="generateGSTR('2b')" style="padding:16px;">GSTR-2B</button>
      <button class="btn btn-primary" onclick="generateGSTR('3b')" style="padding:16px;">GSTR-3B</button>
    </div>
    <div id="gstr-result" style="display:none;">
      <div class="data-section">
        <div class="data-header" id="gstr-title">GSTR Report</div>
        <div id="gstr-content" style="padding:24px;"></div>
        <div style="padding:16px 24px; background:var(--surface); border-top:1px solid var(--border); display:flex; gap:12px;">
          <button class="btn btn-outline" onclick="downloadJSON()">JSON</button>
          <button class="btn btn-outline" onclick="downloadCSV()">CSV</button>
          <button class="btn btn-outline" onclick="downloadPDF()">PDF</button>
          <button class="btn btn-outline" onclick="shareWhatsApp()">WhatsApp</button>
        </div>
      </div>
    </div>
  </div>

  <div id="invoice-view" style="display:none;">
    <h2 style="margin-bottom:24px;">Invoice Generator</h2>
    <div class="data-section">
      <div style="padding:24px;">
        <div class="form-group">
          <label>Invoice Number</label>
          <input type="text" id="inv-number">
        </div>
        <div class="form-group">
          <label>Invoice Date</label>
          <input type="date" id="inv-date">
        </div>
        <div class="form-group">
          <label>Buyer Name</label>
          <input type="text" id="inv-buyer">
        </div>
        <div class="form-group">
          <label>Amount</label>
          <input type="number" id="inv-amount">
        </div>
        <button class="btn btn-primary" onclick="saveInvoice()">Save Invoice</button>
      </div>
    </div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
const SUPABASE_URL = "https://xoueoaaihnidlncyngwu.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhvdWVvYWFpaG5pZGxuY3luZ3d1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI1Nzc4NDgsImV4cCI6MjA5ODE1Mzg0OH0.3i1tWUZoDvNNu8N1HqkDMsuwVAVnQfZ0PmtZ0qZmLlY";

const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
let session = null;
let gstrData = null;

window.onload = async () => {
  const { data } = await sb.auth.getSession();
  if (data.session) setupApp(data.session);
  else document.getElementById('auth-view').style.display = 'block';
};

async function handleLoginSubmit() {
  const email = document.getElementById('auth-email').value;
  const pwd = document.getElementById('auth-password').value;
  if (!email || !pwd) return toast("Email and password required");
  
  const { data, error } = await sb.auth.signInWithPassword({ email, password: pwd });
  if (error) return toast(error.message, 'error');
  setupApp(data.session);
}

async function handleSignupSubmit() {
  const email = document.getElementById('auth-email').value;
  const pwd = document.getElementById('auth-password').value;
  if (!email || pwd.length < 6) return toast("Valid email and 6+ char password required", 'error');
  
  const { error } = await sb.auth.signUp({ email, password: pwd });
  if (error) return toast(error.message, 'error');
  toast("Account created! Check email.", 'success');
}

async function handleLogout() {
  await sb.auth.signOut();
  location.reload();
}

function setupApp(s) {
  session = s;
  document.getElementById('auth-view').style.display = 'none';
  document.getElementById('app-view').style.display = 'block';
  document.getElementById('nav-user').style.display = 'flex';
  document.getElementById('inv-date').valueAsDate = new Date();
  loadDashboard();
}

function switchTab(tab) {
  document.querySelectorAll('[id$="-view"]').forEach(e => e.style.display = 'none');
  document.getElementById(tab + '-view').style.display = 'block';
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  
  if (tab === 'dashboard') loadDashboard();
}

async function loadDashboard() {
  if (!session) return;
  
  const { data: invoices } = await sb.from('invoices').select('*').eq('user_id', session.user.id);
  
  let sales = 0, gst = 0, count = 0;
  const monthly = {};
  
  (invoices || []).forEach(inv => {
    if (!inv.is_purchase) {
      sales += inv.total_amount || 0;
      gst += (inv.cgst_amount || 0) + (inv.sgst_amount || 0);
      const m = new Date(inv.invoice_date).toLocaleDateString('en-IN', { month: 'short' });
      monthly[m] = (monthly[m] || 0) + (inv.total_amount || 0);
    }
    count++;
  });
  
  document.getElementById('stat-sales').textContent = '₹' + sales.toLocaleString('en-IN', { maximumFractionDigits: 0 });
  document.getElementById('stat-gst').textContent = '₹' + gst.toLocaleString('en-IN', { maximumFractionDigits: 0 });
  document.getElementById('stat-scanned').textContent = count;
  
  const ctx = document.getElementById('salesChart');
  if (ctx && Object.keys(monthly).length > 0) {
    new Chart(ctx, {
      type: 'line',
      data: {
        labels: Object.keys(monthly),
        datasets: [{ label: 'Sales', data: Object.values(monthly), borderColor: '#2563eb', fill: true, backgroundColor: 'rgba(37,99,235,0.1)' }]
      },
      options: { responsive: true, maintainAspectRatio: false }
    });
  }
}

async function handleFileSelect(e) {
  const files = Array.from(e.target.files).slice(0, 5);
  if (files.length === 0) return;
  
  document.getElementById('upload-progress').style.display = 'block';
  document.getElementById('progress-list').innerHTML = files.map((f, i) => `
    <div style="padding:12px; background:var(--surface); border-radius:8px; margin-bottom:8px;">
      <div>${f.name} - <span id="status-${i}">Processing...</span></div>
    </div>
  `).join('');
  
  let extracted = [];
  
  for (let i = 0; i < files.length; i++) {
    const file = files[i];
    document.getElementById(`status-${i}`).textContent = 'Uploading...';
    
    try {
      // Simulate extraction
      const data = {
        invoice_number: 'INV-' + Math.random().toString().substr(2, 5),
        invoice_date: new Date().toISOString().split('T')[0],
        buyer_name: 'Sample Buyer',
        buyer_gstin: '15AABCT1234H1Z5',
        total_amount: Math.random() * 50000,
        cgst_amount: Math.random() * 5000,
        sgst_amount: Math.random() * 5000,
        confidence: (85 + Math.random() * 15).toFixed(0)
      };
      extracted.push(data);
      
      document.getElementById(`status-${i}`).textContent = `✓ ${data.confidence}% confidence`;
    } catch (err) {
      document.getElementById(`status-${i}`).textContent = 'Error';
    }
  }
  
  showExtractedData(extracted);
}

function showExtractedData(data) {
  const form = data.map((item, idx) => `
    <div style="background:var(--surface); padding:16px; border-radius:8px; margin-bottom:16px;">
      <div style="margin-bottom:12px;">
        <label>Invoice #</label>
        <input type="text" value="${item.invoice_number}" class="ext-${idx}-inv-num">
      </div>
      <div style="margin-bottom:12px;">
        <label>Date</label>
        <input type="date" value="${item.invoice_date}" class="ext-${idx}-date">
      </div>
      <div style="margin-bottom:12px;">
        <label>Buyer</label>
        <input type="text" value="${item.buyer_name}" class="ext-${idx}-buyer">
      </div>
      <div style="margin-bottom:12px;">
        <label>Amount</label>
        <input type="number" value="${item.total_amount.toFixed(2)}" class="ext-${idx}-amount">
      </div>
      <div style="font-size:12px; color:#999;">Confidence: ${item.confidence}%</div>
    </div>
  `).join('');
  
  document.getElementById('extraction-form').innerHTML = form;
  document.getElementById('extraction-view').style.display = 'block';
  window.extractedData = data;
}

function resetScanner() {
  document.getElementById('file-input').value = '';
  document.getElementById('extraction-view').style.display = 'none';
  document.getElementById('upload-progress').style.display = 'none';
}

async function saveExtractedInvoices() {
  if (!session) return toast('Login required', 'error');
  
  try {
    const forms = document.querySelectorAll('[class^="ext-"]');
    
    for (let i = 0; i < window.extractedData.length; i++) {
      const invNum = document.querySelector(`.ext-${i}-inv-num`)?.value || '';
      const date = document.querySelector(`.ext-${i}-date`)?.value || new Date().toISOString().split('T')[0];
      const buyer = document.querySelector(`.ext-${i}-buyer`)?.value || '';
      const amount = parseFloat(document.querySelector(`.ext-${i}-amount`)?.value) || 0;
      
      await sb.from('invoices').insert({
        user_id: session.user.id,
        invoice_number: invNum,
        invoice_date: date,
        buyer_name: buyer,
        total_amount: amount,
        cgst_amount: amount * 0.09,
        sgst_amount: amount * 0.09,
        status: 'saved'
      });
    }
    
    toast('Invoices saved!', 'success');
    resetScanner();
    loadDashboard();
  } catch (err) {
    toast(err.message, 'error');
  }
}

async function generateGSTR(type) {
  if (!session) return;
  
  const { data: invoices } = await sb.from('invoices').select('*').eq('user_id', session.user.id);
  
  let result = {};
  
  if (type === '1') {
    const b2b = (invoices || []).filter(i => i.buyer_gstin && !i.is_purchase).length;
    const b2c = (invoices || []).filter(i => !i.buyer_gstin && !i.is_purchase).length;
    const amt = (invoices || []).reduce((s, i) => s + (!i.is_purchase ? (i.total_amount || 0) : 0), 0);
    const gst = (invoices || []).reduce((s, i) => s + (!i.is_purchase ? ((i.cgst_amount || 0) + (i.sgst_amount || 0)) : 0), 0);
    
    result = { title: 'GSTR-1 (Sales)', b2b, b2c, total_amount: amt, total_gst: gst };
  } else if (type === '2b') {
    const purchases = (invoices || []).filter(i => i.is_purchase).length;
    const amt = (invoices || []).filter(i => i.is_purchase).reduce((s, i) => s + (i.total_amount || 0), 0);
    result = { title: 'GSTR-2B (Purchases)', purchase_count: purchases, total_amount: amt };
  } else if (type === '3b') {
    const sales = (invoices || []).filter(i => !i.is_purchase).reduce((s, i) => s + (i.total_amount || 0), 0);
    const saleGST = (invoices || []).filter(i => !i.is_purchase).reduce((s, i) => s + ((i.cgst_amount || 0) + (i.sgst_amount || 0)), 0);
    const itc = (invoices || []).filter(i => i.is_purchase).reduce((s, i) => s + ((i.cgst_amount || 0) + (i.sgst_amount || 0)), 0);
    result = { title: 'GSTR-3B (Monthly)', sales_amount: sales, sales_gst: saleGST, itc, net_payable: Math.max(0, saleGST - itc) };
  }
  
  gstrData = result;
  
  document.getElementById('gstr-title').textContent = result.title;
  document.getElementById('gstr-content').innerHTML = Object.entries(result).filter(([k]) => k !== 'title').map(([k, v]) => `
    <div style="display:flex; justify-content:space-between; padding:12px 0; border-bottom:1px solid var(--border);">
      <strong>${k.replace(/_/g, ' ')}</strong>
      <span>${typeof v === 'number' && k.includes('amount') ? '₹' + v.toLocaleString('en-IN', { maximumFractionDigits: 2 }) : v}</span>
    </div>
  `).join('');
  
  document.getElementById('gstr-result').style.display = 'block';
}

function downloadJSON() {
  if (!gstrData) return;
  const blob = new Blob([JSON.stringify(gstrData, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'gstr.json';
  a.click();
  toast('Downloaded!', 'success');
}

function downloadCSV() {
  if (!gstrData) return;
  let csv = 'Key,Value\n';
  Object.entries(gstrData).forEach(([k, v]) => {
    if (k !== 'title') csv += `${k},${v}\n`;
  });
  const blob = new Blob([csv], { type: 'text/csv' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'gstr.csv';
  a.click();
  toast('Downloaded!', 'success');
}

function downloadPDF() {
  toast('PDF download feature coming soon', 'success');
}

function shareWhatsApp() {
  const text = Object.entries(gstrData || {}).map(([k, v]) => `${k}: ${v}`).join('\n');
  window.open('https://wa.me/?text=' + encodeURIComponent(text), '_blank');
}

async function saveInvoice() {
  if (!session) return toast('Login required', 'error');
  
  const invNum = document.getElementById('inv-number').value;
  const date = document.getElementById('inv-date').value;
  const buyer = document.getElementById('inv-buyer').value;
  const amount = parseFloat(document.getElementById('inv-amount').value) || 0;
  
  if (!buyer || !date || !amount) return toast('All fields required', 'error');
  
  try {
    await sb.from('invoices').insert({
      user_id: session.user.id,
      invoice_number: invNum,
      invoice_date: date,
      buyer_name: buyer,
      total_amount: amount,
      cgst_amount: amount * 0.09,
      sgst_amount: amount * 0.09,
      status: 'saved'
    });
    
    toast('Invoice saved!', 'success');
    document.getElementById('inv-number').value = '';
    document.getElementById('inv-buyer').value = '';
    document.getElementById('inv-amount').value = '';
  } catch (err) {
    toast(err.message, 'error');
  }
}

function toast(msg, type = 'success') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show';
  if (type === 'error') t.style.background = '#dc2626';
  else t.style.background = '#059669';
  setTimeout(() => t.classList.remove('show'), 4000);
}
</script>
</body>
</html>
